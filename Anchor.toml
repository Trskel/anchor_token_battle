[toolchain]
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.localnet]
token_battle = "GwL5nCWRMFF13vMbYF6VrgFxu4ExJxkY3gJ8gm7qjCjW"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
